<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Yu-Hao&#39;s Home</title>
    <link rel="icon" href="/imgs/favicon.ico"/>
    <link rel="stylesheet" href="/style/welcome.css"/>
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+US+Modern:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuhao's Home</title>
</head>

<body>
    <div class="container">

    <div class="top-section">
    <div class="slogan">
        <h1>Yuhao's Home</h1>
        <p id="dynamic-text" class="hidden"></p>
    </div>
    <div class="card">
        <div class="name">
        <img src="imgs/avatar.jpg" alt="Avatar">
        Yu-Hao Li
        </div>
        <p>I am a senior undergraduate at the School of Physics, Sun Yat-sen University. My research interest is in the intersection of machine learning, neuroscience and statistical physics.</p>
        <p>Welcome to visit my homepage and feel free to contact me at any time.</p>
    </div>
    </div>
        
    <div class="buttons">
        <a href="/home"><button><i class="fa fa-home"></i> Home</button></a>
        <a href="/research"><button><i class="fa fa-graduation-cap"></i> Research</button></a>
        <a href="/share"><button><i class="fa fa-share-alt"></i> Share</button></a>
        <a href="/"><button><i class="fa fa-sticky-note"></i> Note</button></a>
        <!-- <a href="/blog"><button><i class="fa fa-pencil"></i> Blog</button></a> -->
        <a href="/"><button><i class="fa fa-language"></i> Chinese</button></a>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const textElement = document.getElementById("dynamic-text");
        const text = "Nothing but enthusiasm brightens up the endless years.";
        textElement.textContent = "";
        textElement.classList.remove("hidden");

        let index = 0;
        const typingSpeed = 80;

        const typeWriter = () => {
            if (index < text.length) {
                textElement.innerHTML = text.slice(0, index + 1) + '<span class="cursor"></span>';
                index++;
                setTimeout(typeWriter, typingSpeed);
            } else {
                textElement.innerHTML = text;
            }
        };

        typeWriter();
    });
</script>

</body>

</html>
